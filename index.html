<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驚喜點擊 - 給 Kevin 的特別頁面</title>
    <!-- 使用 Google Fonts 提升排版質感 -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff4d4d;
            --hover-red: #ff3333;
            --bg-color: #020617;
            /* 更深、更純的深藍色 */
            --text-color: #f8fafc;
            --accent-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --shadow-color: rgba(255, 75, 43, 0.4);
            --blue-glow: rgba(30, 64, 175, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(29, 78, 216, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.2) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 2.5rem;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            /* Fix lint */
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .btn-wrapper {
            position: relative;
            padding: 30px;
        }

        /* 更圓、更亮的紅色圓形按鈕 */
        #magic-button {
            width: 160px;
            /* 稍微大一點點 */
            height: 160px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            /* 加入細微的框線增加層次 */
            cursor: pointer;
            background: var(--accent-gradient);
            box-shadow:
                0 0 20px rgba(0, 0, 0, 0.3),
                0 10px 40px var(--shadow-color);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            outline: none;
        }

        #magic-button:hover {
            transform: scale(1.12) rotate(3deg);
            /* 加入一點點旋轉感 */
            box-shadow:
                0 0 30px rgba(0, 0, 0, 0.3),
                0 20px 60px var(--shadow-color);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #magic-button:active {
            transform: scale(0.95);
        }

        /* 按鈕外圍的光圈 (Glow effect) */
        .btn-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: var(--accent-gradient);
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.3;
            transition: all 0.5s ease;
            z-index: 0;
        }

        .btn-wrapper:hover::before {
            opacity: 0.6;
            filter: blur(45px);
            width: 200px;
            height: 200px;
        }

        /* 微動畫 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>點擊這裡有驚喜</h1>

        <div class="btn-wrapper">
            <button id="magic-button" onclick="sayHello()">點我點我</button>
        </div>

        <p class="hint">試試看點擊上面的紅色圓形按鈕</p>
    </div>

    <script>
        function sayHello() {
            // 使用 alert 跳出視窗
            alert("你好，Kevin！");
        }

        // 額外增加小小的點擊動畫邏輯 (選用)
        const btn = document.getElementById('magic-button');
        btn.addEventListener('click', () => {
            console.log('Button clicked by Kevin!');
        });
    </script>
</body>

</html>
